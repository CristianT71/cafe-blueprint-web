<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Café Blueprint - Cargando...</title>
    
    <!-- Redirección automática en 5 segundos hacia tu página de inicio real -->
    <meta http-equiv="refresh" content="5;url=pages/inicio.html">

    <!-- Fuentes opcionales desde internet (si fallan, usa tipografías del sistema temporalmente) -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Playfair+Display:wght@600&family=Plus+Jakarta+Sans:wght@500&display=swap" rel="stylesheet">

    <!-- CSS Puro: Se ejecuta al instante sin depender de librerías externas -->
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #F7F3EE;
        color: #000000;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .loader-container-block {
        text-align: center;
        max-width: 400px;
        width: 100%;
        padding: 20px;
      }
      .brand-icon-container {
        display: inline-block;
        animation: pulse-icon 2s infinite ease-in-out;
        margin-bottom: 1.5rem;
      }
      /* Tu taza negra personalizada */
      .bi-cup-hot {
        background-color: #000000;
        color: #ffffff;
        border-radius: 50%;
        padding: 15px;
        width: 60px;
        height: 60px;
      }
      @keyframes pulse-icon {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.06); opacity: 1; }
      }
      .brand-title {
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .brand-subtitle {
        font-size: 1rem;
        color: #b8732a;
        font-weight: 500;
        margin-bottom: 3rem;
      }
      .progress-loader {
        width: 160px;
        height: 4px;
        background-color: #dbdbdb;
        border-radius: 5px;
        margin: 0 auto 1.2rem auto;
        overflow: hidden;
        position: relative;
      }
      .progress-bar-fill {
        width: 100%;
        height: 100%;
        background-color: #b87333;
        position: absolute;
        left: -100%;
        animation: load-progress 5s linear forwards;
      }
      @keyframes load-progress {
        0% { left: -100%; }
        100% { left: 0%; }
      }
      .status-text {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: #7a7553;
      }
    </style>
  </head>
  <body>

    <div class="loader-container-block">

        </div>
        
        <h1 class="brand-title">Café Blueprint</h1>
        <p class="brand-subtitle">Moliendo granos frescos...</p>

  </body>
</html>
